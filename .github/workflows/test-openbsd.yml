name: Test on OpenBSD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint build.sh
        run: shellcheck -s sh build.sh
      - name: Verify patches apply cleanly
        run: |
          curl -sL https://github.com/dustinkirkland/byobu/archive/refs/tags/6.14.tar.gz | tar xz
          cd byobu-6.14
          for p in ../patches/patch-*; do
            echo "Applying $(basename $p)..."
            patch -p1 < "$p"
          done
          echo "All patches applied cleanly."

  test-openbsd:
    name: OpenBSD Integration
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Test on OpenBSD
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: openbsd
          version: "7.6"
          run: |
            set -e
            echo "==> Installing dependencies..."
            sudo pkg_add -I bash tmux autoconf-2.71 automake-1.16.5 curl bats

            echo "==> Building byobu with patches..."
            export AUTOCONF_VERSION=2.71
            export AUTOMAKE_VERSION=1.16
            ./build.sh --patch-only

            echo "==> Running integration tests..."
            bats tests/
