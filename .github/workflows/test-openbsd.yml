name: Test on OpenBSD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint build.sh
        run: shellcheck -s sh build.sh
      - name: Verify patches apply cleanly
        run: |
          curl -sL https://github.com/dustinkirkland/byobu/archive/refs/tags/6.14.tar.gz | tar xz
          cd byobu-6.14
          for p in ../patches/patch-*; do
            echo "Applying $(basename $p)..."
            patch -p1 < "$p"
          done
          echo "All patches applied cleanly."

  test-openbsd:
    name: OpenBSD Integration
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Test on OpenBSD
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: openbsd
          version: "7.6"
          run: |
            set -e
            echo "==> Installing dependencies..."
            # OpenBSD pkg_add uses stem names; versioned flavors are
            # selected via AUTOCONF_VERSION/AUTOMAKE_VERSION env vars.
            # tmux is not in the base image and must be installed.
            # bats may not be packaged; install from git if needed.
            sudo pkg_add -I bash curl
            sudo pkg_add -I tmux || echo "tmux may already be installed"
            sudo pkg_add -I autoconf automake || true

            # Detect installed autoconf/automake versions
            export AUTOCONF_VERSION=$(ls /usr/local/bin/autoconf-* 2>/dev/null | head -1 | grep -o '[0-9]\.[0-9]*' | head -1 || echo "2.71")
            export AUTOMAKE_VERSION=$(ls /usr/local/bin/automake-* 2>/dev/null | head -1 | grep -o '[0-9]\.[0-9]*' | head -1 || echo "1.16")
            echo "Using AUTOCONF_VERSION=$AUTOCONF_VERSION AUTOMAKE_VERSION=$AUTOMAKE_VERSION"

            # Install bats-core from git if not packaged
            if ! command -v bats >/dev/null 2>&1; then
              sudo pkg_add -I git || true
              git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
              sudo /tmp/bats/install.sh /usr/local
            fi

            echo "==> Building byobu with patches..."
            ./build.sh --patch-only

            echo "==> Running integration tests..."
            bats tests/
